<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 28px;
        }

        input[type="url"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #444;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #2d2d2d;
            color: #ffffff;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13,110,253,0.25);
        }

        button {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0b5ed7;
        }

        .resultado {
            margin-top: 30px;
            padding: 20px;
            background-color: #2d2d2d;
            border-radius: 8px;
            word-break: break-all;
            border: 1px solid #444;
        }

        .resultado p {
            margin: 0 0 10px 0;
            color: #aaaaaa;
            font-size: 14px;
        }

        .resultado a {
            color: #4dabff;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        .resultado a:hover {
            text-decoration: underline;
        }

        .github-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .github-corner:hover {
            opacity: 1;
        }

        .github-corner svg {
            fill: #ffffff;
        }
    </style>
</head>
<body>

<a href="https://github.com/brenocmyk" target="_blank" class="github-corner" title="Ver perfil no GitHub">
    <span>Meu GitHub</span>
    <svg height="24" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="24">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
    </svg>
</a>

<div class="container">
    <h1>✂️ Encurtador de Links</h1>

    <form action="/encurtar" method="post">
        <input type="url" name="urlOriginal" placeholder="Cole sua URL gigante aqui..." required>
        <button type="submit">Encurtar Link</button>
    </form>

    <div class="resultado" th:if="${linkGerado != null}">
        <p>Seu link está pronto:</p>
        <a th:href="${linkGerado}" th:text="${linkGerado}" target="_blank"></a>
    </div>
</div>

</body>
</html>
